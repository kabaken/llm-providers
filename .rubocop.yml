AllCops:
  NewCops: enable
  TargetRubyVersion: 3.0
  SuggestExtensions: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 60
  CountAsOne:
    - hash
    - heredoc
    - array

Metrics/ClassLength:
  Max: 250

Metrics/BlockLength:
  Max: 50
  Exclude:
    - spec/**/*
    - "*.gemspec"

Metrics/BlockNesting:
  Max: 4

Metrics/AbcSize:
  Max: 70

Metrics/CyclomaticComplexity:
  Max: 20

Metrics/PerceivedComplexity:
  Max: 20

Layout/LineLength:
  Max: 120
  Exclude:
    - spec/**/*

Naming/PredicateMethod:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false

Lint/EmptyBlock:
  Exclude:
    - spec/**/*
